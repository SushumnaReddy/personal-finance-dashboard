<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Analytics Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Personal Finance Analytics Dashboard</h1>
    <p>Track your expenses and budgets</p>

    <div class="expense-form">

        <h2>Set Monthly Budget</h2>

        <input
            type="number"
            id="budget-input"
            placeholder="Enter Budget">

        <button id="budget-btn">
            Set Budget
        </button>

    </div>

    <div class="cards">

        <div class="card">
            <h3>Monthly Budget</h3>
            <p id="budget-amount">₹10000</p>
        </div>

        <div class="card">
            <h3>Money Spent</h3>
            <p id="spent-amount">₹0</p>
        </div>

        <div class="card">
            <h3>Remaining Budget</h3>
            <p id="remaining-budget">₹10000</p>
        </div>

    </div>

    <div class="expense-form">

        <h2>Add Expense</h2>

        <label>Amount</label>
        <input type="number" id="amount">

        <label>Category</label>
        <select id="category">
            <option>Food</option>
            <option>Transport</option>
            <option>Shopping</option>
            <option>Bills</option>
            <option>Entertainment</option>
            <option>Other</option>
        </select>

        <label>Date</label>
        <input type="date" id="date">

        <button id="add-btn">
            Add Expense
        </button>

    </div>
<h2>Search Expenses</h2>

<input
    type="text"
    id="search-expense"
    placeholder="Search category...">
    <h2>Expenses</h2>

    <div id="expense-list"></div>

    <h2>Analytics Dashboard</h2>

    <div class="analytics">

        <div class="chart">
            <canvas id="pieChart"></canvas>
        </div>

        <div class="chart">
            <canvas id="barChart"></canvas>
        </div>

    </div>


<h2>Filter Expenses</h2>    
<select id="filter-category">

    <option value="All">
        All Categories
    </option>

    <option value="Food">Food</option>
    <option value="Transport">Transport</option>
    <option value="Shopping">Shopping</option>
    <option value="Bills">Bills</option>
    <option value="Entertainment">Entertainment</option>
    <option value="Other">Other</option>

</select>
<button id="export-btn">
    Export CSV
</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<script src="script.js"></script>

</body>
<footer>

    <p>
        Personal Finance Analytics Dashboard
        © 2026
    </p>

</footer>
</html>
